<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu pedido · Vatec360</title>
    <meta name="description" content="Revisa tu pedido y completa la compra.">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="carrito.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23080808'/><text y='.9em' font-size='72' font-family='sans-serif' font-weight='bold' fill='%230057FF' x='10'>V</text></svg>">
</head>
<body id="carrito-page">

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <nav class="navbar" id="navbar">
        <a href="../" class="logo">VATEC<span>360</span></a>
        <button class="menu-btn" id="menu-btn" aria-label="Abrir menú">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="nav-links">
            <li class="lang-selector">
                <button class="lang-btn active" data-lang="es">ES</button>
                <span>|</span>
                <button class="lang-btn" data-lang="en">EN</button>
                <span>|</span>
                <button class="lang-btn" data-lang="fr">FR</button>
            </li>
            <li><a href="../#servicios">Servicios</a></li>
            <li><a href="../tienda/">Tienda</a></li>
            <li><a href="../#contacto" class="nav-cta">Hablemos</a></li>
        </ul>
    </nav>

    <main class="pedido-main">

        <!-- CABECERA -->
        <div class="pedido-header">
            <div>
                <div class="seccion-eyebrow">
                    <span class="eyebrow-line"></span>
                    <span>Pedido</span>
                </div>
                <h1 class="pedido-titulo">Tu pedido</h1>
            </div>
            <a href="./index.html" class="btn-ghost pedido-volver">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                Volver a la tienda
            </a>
        </div>

        <!-- CONTENIDO CARRITO -->
        <div class="pedido-layout" id="pedido-layout">

            <!-- COLUMNA IZQUIERDA: Items -->
            <div class="pedido-items-col">
                <div class="pedido-items-header">
                    <span>Producto</span>
                    <span>Cantidad</span>
                    <span>Total</span>
                </div>
                <div id="pedido-items">
                    <!-- renderizado por carrito.js -->
                </div>
            </div>

            <!-- COLUMNA DERECHA: Resumen -->
            <div class="pedido-resumen-col">
                <div class="pedido-resumen-box">
                    <h2 class="pedido-resumen-titulo">Resumen</h2>
                    <div id="pedido-resumen">
                        <!-- renderizado por carrito.js -->
                    </div>
                </div>
            </div>

        </div>

        <!-- ESTADO VACÍO -->
        <div class="pedido-vacio" id="pedido-vacio" style="display:none">
            <div class="pedido-vacio-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
            </div>
            <h2>Tu carrito está vacío</h2>
            <p>Explora los productos y encuentra lo que necesitas.</p>
            <a href="./index.html" class="btn-main" style="margin-top: 24px;">Ver productos <span>↗</span></a>
        </div>

    </main>

    <footer class="footer">
        <div class="footer-top">
            <a href="../" class="logo footer-logo">VATEC<span>360</span></a>
            <nav class="footer-nav">
                <a href="../#servicios">Servicios</a>
                <a href="../tienda/">Tienda</a>
                <a href="../#contacto">Hablemos</a>
            </nav>
        </div>
        <div class="footer-bottom">
            <p>© 2026 Vatec360 · Barcelona</p>
            <p>+34 614 454 587</p>
        </div>
    </footer>

    <script src="../js/tema.js"></script>
    <script src="../js/floating-bubbles.js"></script>
    <script src="../script.js"></script>
    <script src="carrito.js"></script>
</body>
</html>
