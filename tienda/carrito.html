<body>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
        <a href="../" class="logo">VATEC<span>360</span></a>
        <button class="menu-btn" id="menu-btn" aria-label="Abrir menú">
            <span></span>
            <span></span>
            <span></span>

    <section class="carrito-hero">

    <section class="carrito-section">

                <a href="./" class="btn-main" style="margin-top: 20px;">Ver productos <span>↗</span></a>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-top">
            <a href="../" class="logo footer-logo">VATEC<span>360</span></a>
            <p class="footer-claim">El latido digital de tu negocio</p>
        </div>
        <div class="footer-bottom">
            <p>© 2026 Vatec360 · Barcelona</p>
            <p>+34 614 454 587</p>

    <script src="../js/tema.js"></script>
    <script src="../js/floating-bubbles.js"></script>
